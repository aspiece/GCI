<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Project completed celebration badge</title>
  <desc id="desc">A professional completion graphic with checkmark badge and confetti accents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="medal" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" rx="24"/>

  <circle cx="260" cy="120" r="22" fill="#f59e0b" opacity="0.85"/>
  <circle cx="930" cy="100" r="16" fill="#60a5fa" opacity="0.8"/>
  <circle cx="1020" cy="220" r="12" fill="#34d399" opacity="0.8"/>
  <circle cx="190" cy="500" r="14" fill="#fb7185" opacity="0.75"/>

  <rect x="250" y="150" width="700" height="330" rx="26" fill="#ffffff" opacity="0.96"/>

  <circle cx="600" cy="295" r="108" fill="url(#medal)"/>
  <circle cx="600" cy="295" r="86" fill="#ecfdf5" opacity="0.95"/>

  <path d="M555 295l30 30 60-70" fill="none" stroke="#059669" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M520 395l-30 100 80-50 30 90 30-90 80 50-30-100" fill="#10b981" opacity="0.95"/>

  <text x="600" y="210" text-anchor="middle" fill="#1e293b" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Project Complete</text>
  <text x="600" y="445" text-anchor="middle" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="22">Great work on your Career Packet!</text>
</svg>
