name: Contact request
description: Maintainer-friendly template for website contact submissions routed through GitHub Issues
title: "Contact Form Submission: "
labels:
  - contact
  - website-inquiry
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reaching out. Please complete all required fields so maintainers can respond clearly.

  - type: input
    id: name
    attributes:
      label: Name
      description: Your full name
      placeholder: Jane Smith
    validations:
      required: true

  - type: input
    id: email
    attributes:
      label: Email
      description: Best email address for follow-up
      placeholder: jane@example.com
    validations:
      required: true

  - type: input
    id: subject
    attributes:
      label: Subject
      description: A short summary of your message
      placeholder: Partnership question
    validations:
      required: true

  - type: textarea
    id: message
    attributes:
      label: Message
      description: Share details that will help maintainers respond
      placeholder: Tell us more about your request...
    validations:
      required: true
