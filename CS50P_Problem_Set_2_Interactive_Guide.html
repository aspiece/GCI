<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CS50P Problem Set 2 – Interactive Student Guide</title>
    <meta name="description"
        content="Student-facing interactive support guide for CS50P Problem Set 2 with lecture concept mapping, official CS50 links, and an in-browser Python runner." />
    <link rel="icon" href="data:," />
    <style>
        :root {
            --bg: #f4f7fc;
            --card: #ffffff;
            --text: #0f172a;
            --muted: #334155;
            --accent: #1d4ed8;
            --accent-2: #1e40af;
            --border: #b8c5d6;
            --ok: #14532d;
            --ok-bg: #dcfce7;
            --warn: #7c2d12;
            --warn-bg: #ffedd5;
            --shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
            color: var(--text);
            background: linear-gradient(180deg, #ebf2ff 0%, var(--bg) 64%);
        }

        .wrap {
            max-width: 1240px;
            margin: 0 auto;
            padding: 24px 16px 42px;
        }

        .skip-link {
            position: absolute;
            left: 16px;
            top: -48px;
            z-index: 1000;
            padding: 10px 14px;
            border-radius: 10px;
            background: #111827;
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
        }

        .skip-link:focus {
            top: 12px;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .topbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 12px;
        }

        .chip {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: #f8fbff;
            color: var(--muted);
            font-weight: 600;
            font-size: 0.82rem;
        }

        .home-link {
            color: var(--accent);
            text-decoration: underline;
            text-underline-offset: 0.18em;
            font-weight: 700;
        }

        .home-link:hover,
        .home-link:focus-visible {
            text-decoration: underline;
        }

        h1 {
            margin: 0 0 6px;
            font-size: clamp(1.6rem, 2.4vw, 2.1rem);
        }

        .lead {
            margin: 0;
            color: var(--muted);
            line-height: 1.45;
        }

        .layout {
            margin-top: 18px;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .layout>section,
        .intro-grid>section {
            min-width: 0;
        }

        .intro-grid {
            margin-top: 12px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: var(--shadow);
            padding: 14px;
        }

        h2 {
            margin: 0 0 10px;
            font-size: 1.14rem;
        }

        h3 {
            margin: 0 0 8px;
            font-size: 1.02rem;
        }

        p {
            margin: 8px 0;
        }

        .subtle {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .grid {
            display: grid;
            gap: 12px;
        }

        .problem-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .problem-tab {
            border: 1px solid var(--border);
            background: #f8fbff;
            color: var(--text);
            border-radius: 10px;
            font-weight: 700;
            padding: 8px 12px;
            cursor: pointer;
        }

        .problem-tab:hover,
        .problem-tab:focus-visible {
            background: #eff6ff;
        }

        .problem-tab.active {
            background: var(--accent);
            color: #ffffff;
            border-color: var(--accent);
        }

        .problem {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            background: #fbfdff;
        }

        .problem.hidden {
            display: none;
        }

        .problem-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
        }

        .problem a {
            color: var(--accent);
            text-decoration: underline;
            text-underline-offset: 0.18em;
            font-weight: 700;
        }

        .problem a:hover,
        .problem a:focus-visible {
            text-decoration: underline;
        }

        .pill-ok {
            display: inline-block;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 700;
            padding: 4px 10px;
            color: var(--ok);
            background: var(--ok-bg);
            border: 1px solid #86efac;
        }

        .hint {
            border-left: 4px solid #0ea5e9;
            padding: 8px 10px;
            border-radius: 8px;
            background: #e0f2fe;
            color: #1e293b;
            margin: 8px 0;
        }

        pre {
            margin: 6px 0 0;
            background: #0b1224;
            color: #e2e8f0;
            border-radius: 10px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            overflow: auto;
        }

        .mini-snippet-editor {
            margin: 6px 0 0;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            overflow: hidden;
        }

        code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
            font-size: 0.86rem;
        }

        ol,
        ul {
            margin: 8px 0 0 20px;
            padding: 0;
            line-height: 1.42;
        }

        li+li {
            margin-top: 4px;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        button {
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            padding: 8px 12px;
            min-height: 44px;
            background: var(--accent);
            color: #ffffff;
        }

        a:focus-visible,
        button:focus-visible,
        textarea:focus-visible,
        input:focus-visible,
        .problem-tab:focus-visible {
            outline: 3px solid #111827;
            outline-offset: 3px;
        }

        button:hover,
        button:focus-visible {
            background: var(--accent-2);
        }

        button.ghost {
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
        }

        button.ghost:hover,
        button.ghost:focus-visible {
            background: #eff6ff;
        }

        button.mini-load {
            min-height: 34px;
            padding: 6px 10px;
            font-size: 0.82rem;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 8px;
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        th,
        td {
            text-align: left;
            padding: 9px 10px;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: #eff6ff;
            font-size: 0.9rem;
        }

        caption {
            color: var(--muted);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .docs ul {
            margin-top: 8px;
        }

        .docs a {
            color: var(--accent);
            text-decoration: underline;
            text-underline-offset: 0.18em;
            font-weight: 700;
        }

        .docs a:hover,
        .docs a:focus-visible {
            text-decoration: underline;
        }

        .runner textarea {
            width: 100%;
            min-height: 0;
            border-radius: 10px;
            border: 1px solid var(--border);
            padding: 10px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
            font-size: 0.9rem;
            resize: vertical;
            background: #0b1224;
            color: #e2e8f0;
        }

        .runner textarea:focus-visible {
            border-color: #93c5fd;
        }

        .editor-host {
            width: 100%;
            height: auto;
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            display: none;
        }

        .editor-note {
            margin-top: 6px;
            color: var(--muted);
            font-size: 0.84rem;
        }

        .runner-output {
            margin-top: 10px;
        }

        .runner-output pre {
            min-height: 130px;
            max-height: 280px;
            margin: 6px 0 0;
        }

        .status {
            display: inline-block;
            border-radius: 999px;
            padding: 3px 10px;
            border: 1px solid #fdba74;
            background: var(--warn-bg);
            color: var(--warn);
            font-size: 0.8rem;
            font-weight: 700;
        }

        .status.ready {
            border-color: #86efac;
            color: var(--ok);
            background: var(--ok-bg);
        }

        .checklist {
            margin-top: 8px;
            display: grid;
            gap: 6px;
        }

        .checklist label {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            color: var(--text);
            font-size: 0.94rem;
        }

        .callout {
            margin-top: 10px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #f8fbff;
            padding: 10px;
            color: var(--muted);
            font-size: 0.92rem;
            line-height: 1.4;
        }

        @media (prefers-contrast: more) {
            :root {
                --muted: #1e293b;
                --accent: #1e3a8a;
                --accent-2: #172554;
                --border: #64748b;
            }

            .card,
            .problem,
            .callout,
            table,
            .editor-host,
            .runner textarea {
                border-width: 2px;
            }

            .pill-ok,
            .status,
            .problem-tab,
            button,
            button.ghost {
                border-width: 2px;
            }
        }

        @media (max-width: 980px) {
            .intro-grid {
                grid-template-columns: 1fr;
            }

            .layout {
                grid-template-columns: 1fr;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            html:focus-within {
                scroll-behavior: auto;
            }
        }

        @media (forced-colors: active) {

            .skip-link,
            .card,
            .problem,
            .problem-tab,
            button,
            button.ghost,
            .status,
            .pill-ok,
            .callout,
            .runner textarea,
            .editor-host,
            table,
            th,
            td {
                forced-color-adjust: auto;
                border: 1px solid CanvasText;
            }

            .problem-tab.active,
            button,
            .status.ready,
            .pill-ok {
                background: Highlight;
                color: HighlightText;
            }
        }

        /* ── Official specs bar ── */
        .specs-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px 16px;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-left: 4px solid var(--accent);
            border-radius: 10px;
            padding: 10px 16px;
            margin-top: 12px;
        }

        .specs-bar strong {
            font-size: 0.88rem;
            color: var(--accent);
            white-space: nowrap;
        }

        .specs-bar a {
            color: var(--accent);
            text-decoration: underline;
            text-underline-offset: 0.18em;
            font-weight: 700;
            font-size: 0.88rem;
        }

        .specs-bar .sep {
            color: var(--border);
        }

        .top-hero {
            margin-top: 8px;
        }

        .top-hero-main h1 {
            margin-top: 2px;
        }

        .compact-top.card {
            padding: 10px 12px;
        }

        .compact-top h2 {
            margin: 0 0 6px;
            font-size: 1.02rem;
        }

        .compact-top ol {
            margin-top: 6px;
        }

        /* ── Progress tracker ── */
        .progress-tracker {
            margin-top: 12px;
            padding: 12px 18px;
            background: #f0f7ff;
            border: 1px solid #bfdbfe;
            border-radius: 12px;
        }

        .progress-tracker h2 {
            margin: 0 0 8px;
            font-size: 1rem;
            color: var(--accent);
        }

        .progress-tracker .items {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 24px;
        }

        .progress-tracker label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.92rem;
            cursor: pointer;
        }

        .progress-tracker label input[type="checkbox"]:checked+span {
            text-decoration: line-through;
            color: var(--muted);
        }

        /* ── Section type labels ── */
        .section-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            font-size: 0.87rem;
            margin: 12px 0 4px;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .section-label.build {
            background: #003366;
            color: #ffffff;
        }

        .section-label.know {
            background: #ffe066;
            color: #333333;
        }

        .section-label.steps {
            background: #198754;
            color: #ffffff;
        }

        .section-label.mistakes {
            background: #b91c1c;
            color: #ffffff;
        }

        .section-label.try {
            background: #6366f1;
            color: #ffffff;
        }

        .section-label.io {
            background: #0ea5e9;
            color: #ffffff;
        }

        /* WCAG-compliant content blocks */
        .hint {
            border-left: 4px solid #0ea5e9;
            padding: 8px 10px;
            border-radius: 8px;
            background: #e0f2fe;
            color: #1e293b;
            margin: 8px 0;
        }

        .start-here {
            background: #e6ffed;
            border: 1px solid #198754;
            border-radius: 8px;
            padding: 8px 12px;
            margin: 6px 0;
            color: #14532d;
        }

        .if-stuck {
            background: #fff3f3;
            border: 1px solid #b91c1c;
            border-radius: 8px;
            padding: 8px 12px;
            margin: 6px 0;
            color: #b91c1c;
            font-size: 0.9rem;
        }

        .io-example {
            background: #0b1224;
            color: #e2e8f0;
            border-radius: 8px;
            padding: 10px 14px;
            margin: 4px 0 6px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
            font-size: 0.84rem;
            line-height: 1.8;
        }

        .do-dont {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .dont-box {
            background: #b91c1c;
            color: #ffffff;
            border: 1px solid #b91c1c;
            border-radius: 10px;
            padding: 10px 12px;
        }

        .do-box {
            background: #198754;
            color: #ffffff;
            border: 1px solid #198754;
            border-radius: 10px;
            padding: 10px 12px;
        }

        /* Dark mode overrides for accessibility */
        body.dark-mode .section-label.build {
            background: #003366;
            color: #ffffff;
        }

        body.dark-mode .section-label.know {
            background: #ffe066;
            color: #333333;
        }

        body.dark-mode .section-label.steps {
